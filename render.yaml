services:
  - type: web
    name: campusorbit-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # FIX: Free Render instances have 512 MB RAM — 2 workers × 2 threads is the
    # safe maximum. --preload shares the MongoDB client across workers correctly.
    startCommand: >
      gunicorn app.main:app
      --workers 2
      --worker-class uvicorn.workers.UvicornWorker
      --preload
      --bind 0.0.0.0:${PORT:-10000}
      --timeout 120
      --keep-alive 5
      --access-logfile -
      --error-logfile -
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: ENV
        value: production

      # ── Database ────────────────────────────────────────────────────────────
      - key: MONGO_URL
        sync: false          # mongodb+srv://user:pass@cluster.mongodb.net/?retryWrites=true&w=majority
      - key: DB_NAME
        value: campusorbit

      # ── Auth ────────────────────────────────────────────────────────────────
      - key: JWT_SECRET
        sync: 41452934652540260606675340398489          # python -c "import secrets; print(secrets.token_hex(32))"

      # ── CORS ────────────────────────────────────────────────────────────────
      # FIX: Set this to your actual Vercel URL (no trailing slash).
      # Multiple URLs: "https://campusorbit.vercel.app,https://www.campusorbit.com"
      # For local dev during testing you can temporarily add: ,http://localhost:3000
      - key: ALLOWED_ORIGINS
        value: "https://campus-orbit2026.vercel.app"

      # ── Gmail SMTP (App Password) ────────────────────────────────────────────
      # HOW TO GET YOUR APP PASSWORD (takes ~2 minutes):
      #   1. myaccount.google.com/security → 2-Step Verification → Turn ON
      #   2. Same page → App Passwords → Mail + Other (CampusOrbit) → Generate
      #   3. Copy the 16-char code WITHOUT spaces or quotes into EMAIL_PASS
      #      Correct:   abcdefghijklmnop
      #      Wrong:     "abcd efgh ijkl mnop"
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USER
        sync: campusorbit2026@gmail.com        # your Gmail address e.g. yourname@gmail.com
      - key: EMAIL_PASS
        sync: aqdywtcckbbzvcll          # 16-char App Password (no spaces, no quotes)

      # ── Cloudinary (image uploads) ───────────────────────────────────────────
      - key: CLOUDINARY_CLOUD_NAME
        sync: 	
CampusOrbit


      - key: CLOUDINARY_API_KEY
        sync: 721313497423698
      - key: CLOUDINARY_API_SECRET
        sync: WGmMrtPqSa4Rmw5tY6nmKK14EIE
